const fbApp = initializeApp(firebaseConfig);
const fbAuth = getAuth(fbApp);
const fbDb = getFirestore(fbApp);
const FB_APP_ID = "applepuzzle";
const FB_COL = () => collection(fbDb, "artifacts", FB_APP_ID, "public", "data", "scores");
async function ensureAuth(){
  if(fbAuth.currentUser)return fbAuth.currentUser;
  try{ await signInAnonymously(fbAuth); return fbAuth.currentUser; }
  catch(e){ throw new Error("認証エラー: "+e.code); }
}
// タイムアウト付きPromise（応答が返らないと固まるのを防ぐ）
function withTimeout(promise,ms){
  return Promise.race([
    promise,
    new Promise(function(_,rej){setTimeout(function(){rej(new Error("timeout"));},ms);})
  ]);
}
// 難易度別ランキング読み込み（time昇順=速い順）
async function loadLBFirebase(boardSize){
  try{
    if(!fbAuth.currentUser)await ensureAuth();
    var q=query(FB_COL(),where("size","==",boardSize),limit(200));
    var snap=await getDocs(q);
    var rows=[];
    snap.forEach(function(doc){
      var dd=doc.data();
      rows.push({name:String(dd.name||"???"),time:Number(dd.time)||0,size:Number(dd.size)||6,date:String(dd.date||"")});
    });
    rows.sort(function(a,b){return a.time-b.time;});
    return rows.slice(0,100);
  }catch(e){ console.warn("LB fetch failed",e); return []; }
}
async function addToLBFirebase(name,timeMs,boardSize){
  var user=await withTimeout(ensureAuth(),5000);
  // 登録（5秒タイムアウト）。ここが成功すれば登録は完了
  await withTimeout(addDoc(FB_COL(),{
    name:name, time:timeMs, size:boardSize,
    date:new Date().toISOString().slice(0,10),
    uid:user.uid
  }),5000);
  // 登録は完了。ランキング読み直しは「おまけ」なので、失敗・遅延しても登録成功は変わらない
  try{
    return await withTimeout(loadLBFirebase(boardSize),5000);
  }catch(e){
    return null; // 読み直し失敗でも登録は成功しているので、nullを返して成功扱い
  }
}
window.__fbLB = { loadLBFirebase, addToLBFirebase, ensureAuth };

<script>
"use strict";

// ===== 定数 =====
var COLOR_POOL=[
  {bg:"#FF4136",border:"#B71C1C"},
  {bg:"#0074D9",border:"#003F7D"},
  {bg:"#2ECC40",border:"#16842A"},
  {bg:"#FFDC00",border:"#B59A00"},
  {bg:"#B10DC9",border:"#6E0880"},
  {bg:"#FF851B",border:"#B85C00"},
  {bg:"#7FDBFF",border:"#2E8FB3"},
  {bg:"#01655B",border:"#013D37"},
  {bg:"#F012BE",border:"#900A72"},
  {bg:"#85144B",border:"#4D0B2C"}
];
var DIRS=[[-1,0],[1,0],[0,-1],[0,1]];
var SIZES=[
  {size:6,label:"6×6",diff:"Normal",color:"#58D68D"},
  {size:8,label:"8×8",diff:"Hard",color:"#F0A500"},
  {size:10,label:"10×10",diff:"Expert",color:"#EC407A"}
];
var STAGES_PER_DIFF=300;
var MEDALS=["🥇","🥈","🥉"],MEDAL_CLR=["#E09F00","#9E9E9E","#cd7f32"];

// ===== シード乱数 =====
function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffleR(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

// ===== ソルバー =====
function solveMRV(cg,size,maxSols){
  maxSols=maxSols||2;
  var cc=[];for(var i=0;i<size;i++)cc.push([]);
  for(var r=0;r<size;r++)for(var c=0;c<size;c++)cc[cg[r][c]].push({r:r,c:c});
  var count=0,found=[];
  var f=[];for(var i2=0;i2<size;i2++)f.push(new Int32Array(size));
  function af(r,c,d){for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){var nr=r+dr,nc=c+dc;if(nr>=0&&nr<size&&nc>=0&&nc<size)f[nr][nc]+=d;}}
  var uR=new Uint8Array(size),uC=new Uint8Array(size),pl=[];
  function solve(rem){
    if(count>=maxSols)return;
    if(!rem.length){count++;found.push(pl.map(function(p){return{r:p.r,c:p.c,ci:p.ci};}));return;}
    var minC=Infinity,chosen=-1,ci2=-1;
    rem.forEach(function(ci,idx){var n=cc[ci].filter(function(p){return!uR[p.r]&&!uC[p.c]&&!f[p.r][p.c];}).length;if(n<minC){minC=n;chosen=ci;ci2=idx;}});
    if(minC===0)return;
    var newRem=rem.slice(0,ci2).concat(rem.slice(ci2+1));
    var cells=cc[chosen];
    for(var k=0;k<cells.length;k++){var r=cells[k].r,c=cells[k].c;if(uR[r]||uC[c]||f[r][c])continue;uR[r]=1;uC[c]=1;af(r,c,1);pl.push({r:r,c:c,ci:chosen});solve(newRem);pl.pop();uR[r]=0;uC[c]=0;af(r,c,-1);if(count>=maxSols)return;}
  }
  var rem0=[];for(var z=0;z<size;z++)rem0.push(z);
  solve(rem0);
  return{count:count,found:found};
}
function makeTruth(size,rng){
  for(var t=0;t<500;t++){
    var rr=shuffleR(range(size),rng),cc=shuffleR(range(size),rng);
    var pos=rr.map(function(row,i){return{row:row,col:cc[i],color:i};});
    var ok=pos.every(function(p,i){return pos.every(function(q,j){return i===j||!(Math.abs(p.row-q.row)<=1&&Math.abs(p.col-q.col)<=1);});});
    if(ok)return pos;
  }
  return null;
}
function range(n){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
function makeConnected(size,truth,rng){
  var cg=[];for(var i=0;i<size;i++){var row=[];for(var j=0;j<size;j++)row.push(-1);cg.push(row);}
  truth.forEach(function(t){cg[t.row][t.col]=t.color;});
  var changed=true;
  while(changed){
    changed=false;
    var order=shuffleR(range(size*size),rng);
    for(var oi=0;oi<order.length;oi++){
      var idx=order[oi],r=Math.floor(idx/size),c=idx%size;
      if(cg[r][c]>=0)continue;
      var nb=[];
      for(var di=0;di<DIRS.length;di++){var nr=r+DIRS[di][0],nc=c+DIRS[di][1];if(nr>=0&&nr<size&&nc>=0&&nc<size&&cg[nr][nc]>=0)nb.push(cg[nr][nc]);}
      if(nb.length){cg[r][c]=nb[Math.floor(rng()*nb.length)];changed=true;}
    }
  }
  return cg;
}
function isConn(cg,ci,size){
  var cells=[];for(var r=0;r<size;r++)for(var c=0;c<size;c++)if(cg[r][c]===ci)cells.push([r,c]);
  if(!cells.length)return true;
  var vis={};vis[cells[0][0]+","+cells[0][1]]=1;var q=[cells[0]],cnt=1;
  while(q.length){var cur=q.shift();for(var di=0;di<DIRS.length;di++){var nr=cur[0]+DIRS[di][0],nc=cur[1]+DIRS[di][1];if(nr<0||nr>=size||nc<0||nc>=size||cg[nr][nc]!==ci)continue;var key=nr+","+nc;if(!vis[key]){vis[key]=1;cnt++;q.push([nr,nc]);}}}
  return cnt===cells.length;
}
function canChange(cg,r,c,nc2,size,fixed){
  if(fixed[r+","+c])return false;
  var oc=cg[r][c];if(oc===nc2)return false;
  var has=false;for(var di=0;di<DIRS.length;di++){var nr=r+DIRS[di][0],ncc=c+DIRS[di][1];if(nr>=0&&nr<size&&ncc>=0&&ncc<size&&cg[nr][ncc]===nc2){has=true;break;}}
  if(!has)return false;
  cg[r][c]=nc2;var ok=isConn(cg,oc,size);cg[r][c]=oc;return ok;
}
function generatePuzzle(size,seed){
  var baseRng=seed!=null?mulberry32(seed):Math.random;
  for(var outer=0;outer<400;outer++){
    var rng=seed!=null?mulberry32((seed*7919+outer*104729)>>>0):Math.random;
    var truth=makeTruth(size,rng);if(!truth)continue;
    var fixed={};truth.forEach(function(s){fixed[s.row+","+s.col]=1;});
    var cg=makeConnected(size,truth,rng);
    var bad=false;for(var r=0;r<size;r++)for(var c=0;c<size;c++)if(cg[r][c]<0)bad=true;
    if(bad)continue;
    for(var iter=0;iter<300;iter++){
      var res=solveMRV(cg,size,2);
      if(res.count===1){
        var colorRng=seed!=null?mulberry32((seed*31+7)>>>0):Math.random;
        return{colorGrid:cg,colors:shuffleR(COLOR_POOL,colorRng).slice(0,size),size:size};
      }
      if(res.count===0)break;
      var alt=null;
      for(var fi=0;fi<res.found.length;fi++){
        var sol=res.found[fi];
        var isT=sol.every(function(p){var t=truth.filter(function(s){return s.color===p.ci;})[0];return t&&t.row===p.r&&t.col===p.c;});
        if(!isT){alt=sol;break;}
      }
      if(!alt)break;
      var changed=false;
      var altS=shuffleR(alt.slice(),rng);
      for(var ai=0;ai<altS.length;ai++){
        var p=altS[ai];var t=truth.filter(function(s){return s.color===p.ci;})[0];
        if(t&&t.row===p.r&&t.col===p.c)continue;
        var others=shuffleR(truth.filter(function(s){return s.color!==p.ci;}),rng);
        for(var pi=0;pi<others.length;pi++){if(canChange(cg,p.r,p.c,others[pi].color,size,fixed)){cg[p.r][p.c]=others[pi].color;changed=true;break;}}
        if(changed)break;
      }
      if(!changed)break;
    }
  }
  // フォールバック
  var truth2=makeTruth(size,baseRng);
  if(!truth2){truth2=[];for(var i=0;i<size;i++)truth2.push({row:i,col:(i*3)%size,color:i});}
  return{colorGrid:makeConnected(size,truth2,baseRng),colors:shuffleR(COLOR_POOL,baseRng).slice(0,size),size:size};
}

// ===== バリデーション =====
function validate(placed,size){
  var keys=Object.keys(placed);
  if(!keys.length)return{errors:{},complete:false};
  var errors={},rowMap={},colMap={},colorMap={};
  keys.forEach(function(key){
    var p=key.split("-"),r=+p[0],c=+p[1],color=placed[key];
    (rowMap[r]=rowMap[r]||[]).push(key);
    (colMap[c]=colMap[c]||[]).push(key);
    (colorMap[color]=colorMap[color]||[]).push(key);
  });
  [rowMap,colMap,colorMap].forEach(function(m){Object.keys(m).forEach(function(k){if(m[k].length>1)m[k].forEach(function(key){errors[key]=1;});});});
  keys.forEach(function(k1){
    var p1=k1.split("-"),r1=+p1[0],c1=+p1[1];
    keys.forEach(function(k2){
      if(k1>=k2)return;
      var p2=k2.split("-"),r2=+p2[0],c2=+p2[1];
      if(Math.abs(r1-r2)<=1&&Math.abs(c1-c2)<=1){errors[k1]=1;errors[k2]=1;}
    });
  });
  return{errors:errors,complete:Object.keys(errors).length===0&&keys.length===size};
}

var ACtx=window.AudioContext||window.webkitAudioContext;var actx=null;
function gAC(){if(!actx&&ACtx)try{actx=new ACtx()}catch(e){}return actx}
function tn(f,d,t,v){d=d||.1;t=t||"sine";v=v||.15;try{var c=gAC();if(!c)return;if(c.state==="suspended")c.resume();var o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+d)}catch(e){}}

// ===== データ保存（localStorage主軸 + IndexedDB補助） =====
var DB="applepuzzle",STO="data";
var LS_PREFIX="applepuzzle_";
function openDB(){return new Promise(function(res,rej){var r=indexedDB.open(DB,1);r.onupgradeneeded=function(){r.result.createObjectStore(STO)};r.onsuccess=function(){res(r.result)};r.onerror=function(){rej(r.error)}})}
// localStorage（同期・即時・タスクキルに強い）
function lsGet(k){try{var v=localStorage.getItem(LS_PREFIX+k);return v!=null?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(LS_PREFIX+k,JSON.stringify(v));return true;}catch(e){return false;}}
// 読み込み: localStorage優先、なければIndexedDBから復元
function dbGet(k){
  var ls=lsGet(k);
  if(ls!=null)return Promise.resolve(ls);
  return openDB().then(function(db){return new Promise(function(res){var tx=db.transaction(STO,"readonly");var r=tx.objectStore(STO).get(k);r.onsuccess=function(){db.close();var val=r.result!=null?r.result:null;if(val!=null)lsSet(k,val);res(val);};r.onerror=function(){db.close();res(null)}})}).catch(function(){return null});
}
// 保存: localStorageに即時保存（同期）+ IndexedDBにも（非同期・補助）
function dbSet(k,v){
  lsSet(k,v); // 同期で即座に保存（これが主軸）
  try{openDB().then(function(db){var tx=db.transaction(STO,"readwrite");tx.objectStore(STO).put(v,k);tx.oncomplete=function(){db.close();};tx.onerror=function(){db.close();};}).catch(function(){});}catch(e){}
  return Promise.resolve(true);
}

var TUT_COLORS=COLOR_POOL.slice(0,6);
var TUT_GRID=[

var TUT_APPLE={r:3,c:4,ci:4};
var TUT_STEPS=[
  {title:"ルール① 各色に1個だけ",mode:"color-lock",note:"✕ のマスには置けない（同じ色エリア）",noteColor:"#C0392B"},

<script>

function TutGrid(props){

      if(!isApple){

        else if(mode==="rowcol"&&(r===apple.r||c===apple.c))showX=true;

function App(){

  var _er=useState({}),errors=_er[0],setErrors=_er[1];
  var _el=useState(0),elapsed=_el[0],setElapsed=_el[1];
  var _ct=useState(0),clearTime=_ct[0],setClearTime=_ct[1];
  var _cl=useState(false),cleared=_cl[0],setCleared=_cl[1];

  var timerRef=useRef(null),startRef=useRef(0),placedRef=useRef({});
  placedRef.current=placed;
  var bestRef=useRef({}),stagesRef=useRef({}),loadedRef=useRef(false);
  bestRef.current=bestTimes;stagesRef.current=stageClears;

  useEffect(function(){
    // データ読み込み（完了したらloadedRefをtrueに）
    Promise.all([
      dbGet("best").then(function(d){if(d)setBestTimes(d);}),
      dbGet("stages").then(function(d){if(d)setStageClears(d);}),
      dbGet("muted").then(function(d){if(d){muted=d;setMutedS(d);}})
    ]).then(function(){loadedRef.current=true;}).catch(function(){loadedRef.current=true;});
    // Firebase認証を事前に済ませてランキング読み込みを高速化
    try{if(window.__fbLB&&window.__fbLB.ensureAuth)window.__fbLB.ensureAuth();}catch(e){}
    // ページ非表示・離脱の瞬間に最新データを保存（読み込み完了後のみ＝空上書き防止）
    function flush(){
      if(!loadedRef.current)return; // 読み込み前は保存しない（空データ上書き防止）
      try{
        if(bestRef.current&&Object.keys(bestRef.current).length>0)lsSet("best",bestRef.current);
        if(stagesRef.current&&Object.keys(stagesRef.current).length>0)lsSet("stages",stagesRef.current);
      }catch(e){}
    }
    document.addEventListener("visibilitychange",function(){if(document.visibilityState==="hidden")flush();});
    window.addEventListener("pagehide",flush);
    window.addEventListener("beforeunload",flush);
  },[]);

  useEffect(function(){
    if(screen!=="game"||cleared||mode!=="timeattack"||!puzzle)return;
    timerRef.current=setInterval(function(){setElapsed(Date.now()-startRef.current)},50);
    return function(){clearInterval(timerRef.current)};
  },[screen,cleared,mode,puzzle]);

  useEffect(function(){
    if(screen==="game"&&!cleared&&!mutedS)startBGM();else stopBGM();
    return stopBGM;
  },[screen,cleared,mutedS]);

  function toggleMute(){
    var nm=!mutedS;muted=nm;setMutedS(nm);dbSet("muted",nm);
    if(nm)stopBGM();else if(screen==="game")startBGM();
  }

  function beginGame(s,stg){
    if(gAC()&&gAC().state==="suspended")gAC().resume();
    clearInterval(timerRef.current);
    setSize(s);setStage(stg===undefined?null:stg);setPlaced({});setErrors({});
    setCleared(false);setElapsed(0);setPuzzle(null);setScreen("game");setGenerating(true);
    setSub(false);setSubErr(false);setPName("");
    setTimeout(function(){
      var seed=stg!=null&&stg!==undefined?stageSeed(s,stg):null;
      var p=generatePuzzle(s,seed);
      setPuzzle(p);setGenerating(false);
      var now=Date.now();startRef.current=now;setElapsed(0);
    },20);
  }

  function handleCell(r,c){
    if(cleared||!puzzle)return;
    var key=r+"-"+c,ci=puzzle.colorGrid[r][c];
    var cur=placedRef.current,next={};
    for(var k in cur)next[k]=cur[k];
    var didRemove=false;
    if(next[key]!==undefined){delete next[key];didRemove=true;}
    else{
      for(var kk in next)if(next[kk]===ci){delete next[kk];break;}
      next[key]=ci;
    }
    var res=validate(next,puzzle.size);
    if(didRemove)sfxRemove();else sfxPlace();
    vib(8);
    setPlaced(next);setErrors(res.errors);
    if(res.complete){
      var t=Date.now()-startRef.current;
      setClearTime(t);setCleared(true);setElapsed(t);
      clearInterval(timerRef.current);stopBGM();sfxClear();vib([30,30,60]);

        // 保存値を先に計算してから保存（setState外で確実に実行）
        var prevBest=bestRef.current||{};
        var nb={};for(var k in prevBest)nb[k]=prevBest[k];

        var prevStg=stagesRef.current||{};
        var ns={};for(var k2 in prevStg)ns[k2]=prevStg[k2];
        ns[size+"-"+stage]=1;
        stagesRef.current=ns;
        dbSet("stages",ns);
        setStageClears(ns);
      }
      setTimeout(function(){setScreen("clear")},700);
    }
  }

  function fetchLB(s){setLbFetching(true);loadLB(s).then(function(data){setLb(data);setLbFetching(false)});}

    addToLB(pName.trim().slice(0,12),clearTime,size).then(function(board){
      // board=null は「登録成功・ランキング読み直しのみ失敗」。登録は完了しているので成功扱い
      if(board)setLb(board);
      setSub(true);setSubLoad(false);setLbSize(size);
    }).catch(function(){
      setSubLoad(false);setSubErr(true); // 登録そのものが失敗→ボタン復活＋エラー表示で再試行可能に
    });

        h("div",{style:{display:"flex",gap:14,marginBottom:14,width:"100%"}},
          h("button",{style:Object.assign({},ST.menuBtnHalf,{background:"white",color:"#888",border:"2px solid #EEE"}),onClick:function(){setTutStep(0);setScreen("tutorial")}},

          h("button",{style:Object.assign({},ST.menuBtnHalf,{background:"linear-gradient(135deg,#FFD23F,#F0A500)"}),onClick:function(){setLbSize(6);fetchLB(6);setScreen("ranking")}},
            h("span",null,"ランキング"))),
        h("div",{style:{display:"flex",gap:14,width:"100%"}},
          h("button",{style:Object.assign({},ST.menuBtnHalf,{background:"linear-gradient(135deg,#58D68D,#48C9B0)"}),onClick:function(){gAC();setMode("normal");setScreen("modeSelect")}},
            h("span",null,"ステージ")),
          h("button",{style:Object.assign({},ST.menuBtnHalf,{background:"linear-gradient(135deg,#5DADE2,#AF7AC5)"}),onClick:function(){gAC();setMode("timeattack");setScreen("modeSelect")}},
            h("span",null,"タイム",h("br"),"アタック")))));
  }

  if(screen==="ranking"){
    return h("div",{style:Object.assign({},ST.page,{justifyContent:"flex-start",paddingTop:20})},MuteBtn,
      h("div",{style:{width:"100%",maxWidth:420,display:"flex",flexDirection:"column",height:"100%"}},
        h("div",{style:{display:"flex",alignItems:"center",marginBottom:10}},
          h("button",{style:ST.bigBackBtn,onClick:function(){setScreen("title")}},"← 戻る")),
        h("h2",{style:{fontSize:22,fontWeight:900,color:"#F0A500",margin:"0 0 14px",textAlign:"center"}},"ランキング"),

          lb.map(function(en,i){return lbEntry(en,i)}))));

  if(screen==="modeSelect"){

        h("h2",{style:{fontSize:20,fontWeight:900,color:"#1A1A1A",margin:"4px 0 4px",textAlign:"center"}},mode==="timeattack"?"タイムアタック":"ステージ"),
        h("p",{style:{fontSize:12,color:"#AAA",margin:"0 0 18px",textAlign:"center"}},"難易度を選んでね"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}},

  if(screen==="clear"){
    var isTA=mode==="timeattack";
    var best=isTA?bestTimes[size]:null;

    return h("div",{style:ST.page},
      h("div",{style:Object.assign({},ST.card,{maxWidth:320,textAlign:"center"})},

        isNewBest?h("p",{style:{color:"#FF6B6B",fontSize:13,fontWeight:700,margin:"0 0 12px"}},"ベスト更新！"):h("p",{style:{color:"#999",fontSize:13,margin:"0 0 12px"}},"おめでとう！"),
        isTA?h("div",{style:{background:"#FFF5F5",borderRadius:14,padding:"12px 16px",marginBottom:8}},

        isTA&&best?h("div",{style:{background:"#FFF8F0",borderRadius:14,padding:"8px 16px",marginBottom:16}},
          h("div",{style:{fontSize:18,fontWeight:900,color:"#FF6B6B",fontVariantNumeric:"tabular-nums"}},fmt(best)),
          h("div",{style:{fontSize:11,color:"#AAA",marginTop:2}},"ベスト")):h("div",{style:{height:8}}),
        isTA?(submitted?h("div",{style:{color:"#27AE60",fontSize:"0.85rem",fontWeight:700,marginBottom:24}},"ランキングに登録しました！"):

            subErr?h("div",{style:{color:"#e74c3c",fontSize:"0.75rem",fontWeight:700,marginTop:8,textAlign:"center"}},"登録できませんでした。もう一度お試しください"):null)):null,
        h("div",{style:{display:"flex",gap:12}},
          isTA?h("button",{style:ST.btnSecondary,onClick:function(){setScreen("modeSelect")}},"← 戻る"):null,
          isTA?h("button",{style:ST.btnPrimary,onClick:function(){beginGame(size,stage)}},"もう一回"):null,
          !isTA?h("button",{style:ST.btnSecondary,onClick:function(){setScreen("stageSelect")}},"← 戻る"):null,
          !isTA&&hasNext?h("button",{style:ST.btnPrimary,onClick:function(){beginGame(size,stage+1)}},"次のステージ"):null)));
  }

  if(screen==="game"&&generating){
    return h("div",{style:ST.page},MuteBtn,
      h("div",{style:{textAlign:"center",color:"#AAA"}},
        h("div",{style:{fontSize:40,marginBottom:12}},"🍎"),
        h("div",{style:{fontSize:14,fontWeight:700}},"パズルを生成中...")));
  }

  if(!puzzle)return null;
  var cellPx=size===6?52:size===8?40:31;
  var cellGap=size===6?4:size===8?3:2;
  var cellPad=cellGap/2;
  var remaining=size-Object.keys(placed).length;

  var gridCells=[];
  for(var r=0;r<size;r++){
    for(var c=0;c<size;c++){
      (function(r,c){
        var key=r+"-"+c,ci=puzzle.colorGrid[r][c],col=puzzle.colors[ci];
        var isPlaced=placed[key]!==undefined,hasErr=errors[key];
        gridCells.push(h("div",{key:key,
          style:{width:cellPx+cellPad*2,height:cellPx+cellPad*2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxSizing:"border-box",pointerEvents:"none"}},
          h("div",{style:{width:cellPx,height:cellPx,borderRadius:size===6?9:size===8?7:6,background:col.bg,
            border:hasErr?"3px solid #e74c3c":isPlaced?"2.5px solid "+col.border:"1.5px solid "+col.border+"88",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:cellPx*0.46,
            transition:"transform 0.08s",pointerEvents:"none",
            boxShadow:hasErr?"0 0 12px rgba(231,76,60,0.6)":isPlaced?"0 3px 8px "+col.border+"44":"0 1px 2px rgba(0,0,0,0.06)",
            transform:isPlaced?"scale(0.92)":"scale(1)"}},
            isPlaced?"🍎":"")));
      })(r,c);
    }

  return h("div",{style:ST.page},MuteBtn,
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",maxWidth:460,marginBottom:8}},

          h("span",{style:{fontSize:20,fontWeight:900,fontVariantNumeric:"tabular-nums"}},fmt(elapsed))):
          h("div",{style:{fontSize:16,fontWeight:900,color:"#888"}},"りんごパズル"),
        mode==="timeattack"&&bestTimes[size]?h("div",{style:{fontSize:11,color:"#FF6B6B",fontWeight:700,marginTop:3}},"ベスト "+fmt(bestTimes[size])):null),
      h("button",{style:ST.gameBtn,onClick:function(){beginGame(size,stage)}},"↺")),
    h("div",{style:{marginBottom:8,width:"100%",maxWidth:460}},h(RuleChips)),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat("+size+","+(cellPx+cellPad*2)+"px)",gap:0,padding:7,borderRadius:16,background:"rgba(255,255,255,0.4)",boxShadow:"0 8px 32px rgba(0,0,0,0.1)"},
      onClick:function(e){
        var gridEl=e.currentTarget;

        var pad=7,cellSize=cellPx+cellPad*2;
        var x=e.clientX-rect.left-pad;
        var y=e.clientY-rect.top-pad;
        var cc=Math.floor(x/cellSize);
